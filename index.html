<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS LEARNING - Tutor Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .nav-link { transition: all 0.3s; }
        .nav-link.active { background-color: #4f46e5; color: white; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-white border-r border-gray-200 flex flex-col">
        <div class="p-6 border-b">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-2xl">📚</div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">IELTS LEARNING</h1>
                    <p class="text-xs text-gray-500">1:1 Tutoring</p>
                </div>
            </div>
        </div>
        
        <nav class="flex-1 p-4 space-y-1">
            <a href="#" onclick="navigateTo('dashboard')" class="nav-link active flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100" id="nav-dashboard">
                <i class="fas fa-home w-5"></i><span>Dashboard</span>
            </a>
            <a href="#" onclick="navigateTo('students')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100" id="nav-students">
                <i class="fas fa-users w-5"></i><span>Học viên</span>
            </a>
            <a href="#" onclick="navigateTo('schedule')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100" id="nav-schedule">
                <i class="fas fa-calendar-alt w-5"></i><span>Lịch học</span>
            </a>
            <a href="#" onclick="navigateTo('lessons')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100" id="nav-lessons">
                <i class="fas fa-book w-5"></i><span>Buổi học</span>
            </a>
            <a href="#" onclick="navigateTo('homework')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100" id="nav-homework">
                <i class="fas fa-tasks w-5"></i><span>Bài tập</span>
            </a>
            <a href="#" onclick="navigateTo('exams')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100" id="nav-exams">
                <i class="fas fa-clipboard-list w-5"></i><span>Thi thử</span>
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white border-b px-8 py-5 flex justify-between items-center">
            <h2 class="text-3xl font-semibold text-gray-800" id="page-title">Dashboard</h2>
            <button onclick="addNewStudent()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2 font-medium">
                <i class="fas fa-plus"></i> Thêm học viên
            </button>
        </header>

        <div class="flex-1 overflow-auto p-8" id="main-content">
            <!-- Dashboard -->
            <div id="dashboard-content">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-3xl p-6 card-hover"><p class="text-gray-500">Học viên</p><p class="text-5xl font-bold" id="total-stu">3</p></div>
                    <div class="bg-white rounded-3xl p-6 card-hover"><p class="text-gray-500">Bài tập chờ</p><p class="text-5xl font-bold text-amber-600" id="pending-hw">2</p></div>
                    <div class="bg-white rounded-3xl p-6 card-hover"><p class="text-gray-500">Buổi học</p><p class="text-5xl font-bold" id="total-les">5</p></div>
                    <div class="bg-white rounded-3xl p-6 card-hover"><p class="text-gray-500">Điểm TB</p><p class="text-5xl font-bold text-emerald-600">7.2</p></div>
                </div>
            </div>

            <!-- Students -->
            <div id="students-content" class="hidden">
                <div class="flex justify-between mb-6">
                    <h3 class="text-2xl font-semibold">Danh sách học viên</h3>
                    <input id="student-search" placeholder="Tìm học viên..." onkeyup="filterStudents()" class="px-5 py-3 border rounded-3xl w-80">
                </div>
                <div id="students-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <!-- Schedule -->
            <div id="schedule-content" class="hidden">
                <h3 class="text-2xl font-semibold mb-6">Lịch học</h3>
                <div id="schedule-list" class="space-y-4"></div>
            </div>

            <!-- Lessons -->
            <div id="lessons-content" class="hidden">
                <button onclick="logNewLesson()" class="mb-6 bg-indigo-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2">
                    <i class="fas fa-plus"></i> Ghi nhận buổi học
                </button>
                <table class="w-full bg-white rounded-3xl overflow-hidden" id="lessons-table">
                    <thead><tr class="bg-gray-50"><th class="py-4 px-6 text-left">Ngày</th><th class="py-4 px-6 text-left">Học viên</th><th class="py-4 px-6 text-left">Chủ đề</th><th class="py-4 px-6 text-left">Ghi chú</th></tr></thead>
                    <tbody id="lessons-body"></tbody>
                </table>
            </div>

            <!-- Homework -->
            <div id="homework-content" class="hidden">
                <button onclick="assignHomework()" class="mb-6 bg-indigo-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2">
                    <i class="fas fa-plus"></i> Giao bài tập mới
                </button>
                <div id="homework-list" class="space-y-6"></div>
            </div>

            <!-- Exams -->
            <div id="exams-content" class="hidden">
                <button onclick="createExam()" class="mb-6 bg-indigo-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2">
                    <i class="fas fa-plus"></i> Thi thử mới
                </button>
                <div id="exams-list" class="space-y-4"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl max-w-lg w-full mx-4 modal" id="modal-content"></div>
</div>

<script>
// Data
let students = JSON.parse(localStorage.getItem('students')) || [];
let lessons = JSON.parse(localStorage.getItem('lessons')) || [];
let homework = JSON.parse(localStorage.getItem('homework')) || [];
let exams = JSON.parse(localStorage.getItem('exams')) || [];
let schedules = JSON.parse(localStorage.getItem('schedules')) || [];

function saveData() {
    localStorage.setItem('students', JSON.stringify(students));
    localStorage.setItem('lessons', JSON.stringify(lessons));
    localStorage.setItem('homework', JSON.stringify(homework));
    localStorage.setItem('exams', JSON.stringify(exams));
    localStorage.setItem('schedules', JSON.stringify(schedules));
}

// Navigation
function navigateTo(page) {
    document.querySelectorAll('#main-content > div').forEach(div => div.classList.add('hidden'));
    document.getElementById(page + '-content').classList.remove('hidden');
    
    document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
    document.getElementById('nav-' + page).classList.add('active');
    
    document.getElementById('page-title').textContent = {
        dashboard: 'Dashboard',
        students: 'Học viên',
        schedule: 'Lịch học',
        lessons: 'Buổi học',
        homework: 'Bài tập',
        exams: 'Thi thử'
    }[page];

    if (page === 'students') renderStudents();
    if (page === 'homework') renderHomework();
    if (page === 'lessons') renderLessons();
    if (page === 'exams') renderExams();
    if (page === 'schedule') renderSchedules();
}

// Render
function renderStudents() {
    const container = document.getElementById('students-grid');
    container.innerHTML = students.map(s => `
        <div onclick="viewStudent(${s.id})" class="bg-white rounded-3xl p-6 card-hover cursor-pointer">
            <h4 class="font-semibold">${s.name}</h4>
            <p class="text-gray-500">${s.email || ''}</p>
            <p class="text-indigo-600">Target: ${s.targetBand}</p>
        </div>
    `).join('');
}

function renderHomework() {
    const container = document.getElementById('homework-list');
    container.innerHTML = homework.map((hw, i) => `
        <div class="bg-white border rounded-3xl p-6">
            <div class="flex justify-between">
                <div>
                    <strong>${hw.student}</strong><br>
                    <span>${hw.task}</span>
                </div>
                <span class="px-4 py-1 rounded-full text-sm ${hw.status === 'Submitted' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                    ${hw.status}
                </span>
            </div>
            ${hw.fileName ? `<a href="${hw.fileData}" download="${hw.fileName}" class="text-indigo-600 mt-3 block">📎 ${hw.fileName}</a>` : ''}
            <button onclick="submitHomework(${i})" class="mt-4 w-full py-3 border-2 border-dashed rounded-2xl text-indigo-600">
                ${hw.status === 'Submitted' ? 'Cập nhật file' : 'Nộp bài'}
            </button>
        </div>
    `).join('');
}

function renderLessons() {
    const tbody = document.getElementById('lessons-body');
    tbody.innerHTML = lessons.map(l => `
        <tr class="border-b"><td class="px-6 py-4">${l.date}</td><td class="px-6 py-4">${l.student}</td><td class="px-6 py-4">${l.topic}</td></tr>
    `).join('');
}

function renderExams() {
    const container = document.getElementById('exams-list');
    container.innerHTML = exams.map(ex => `
        <div class="bg-white border rounded-3xl p-6">
            <strong>${ex.student}</strong> - ${ex.type} - Band ${ex.score}
        </div>
    `).join('');
}

function renderSchedules() {
    const container = document.getElementById('schedule-list');
    container.innerHTML = schedules.map(s => `
        <div class="bg-white p-5 rounded-3xl">${s.student} - ${s.day} ${s.time}</div>
    `).join('');
}

// Modal functions
function closeModal() {
    document.getElementById('modal').classList.add('hidden');
}

function viewStudent(id) {
    const s = students.find(st => st.id === id);
    document.getElementById('modal-content').innerHTML = `
        <div class="p-8">
            <h2 class="text-2xl font-bold">${s.name}</h2>
            <button onclick="closeModal()" class="mt-6 w-full py-4 border rounded-2xl">Đóng</button>
        </div>
    `;
    document.getElementById('modal').classList.remove('hidden');
}

function addNewStudent() {
    const name = prompt("Tên học viên:");
    if (!name) return;
    students.push({id: Date.now(), name: name, targetBand: "7.0"});
    saveData();
    renderStudents();
    alert("Thêm thành công!");
}

function assignHomework() {
    const student = prompt("Tên học viên:");
    const task = prompt("Nội dung bài tập:");
    if (!student || !task) return;
    homework.push({id: Date.now(), student, task, due: "2026-07-10", status: "Pending", fileName: null, fileData: null});
    saveData();
    renderHomework();
}

function submitHomework(index) {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            homework[index].fileData = ev.target.result;
            homework[index].fileName = file.name;
            homework[index].status = "Submitted";
            saveData();
            renderHomework();
            alert(`Nộp thành công: ${file.name}`);
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

function logNewLesson() {
    const student = prompt("Học viên:");
    const topic = prompt("Chủ đề:");
    if (student && topic) {
        lessons.push({date: new Date().toISOString().slice(0,10), student, topic});
        saveData();
        renderLessons();
    }
}

function createExam() {
    const student = prompt("Học viên:");
    const score = prompt("Điểm Band:");
    if (student && score) {
        exams.push({student, type: "Mock Test", score, date: new Date().toISOString().slice(0,10)});
        saveData();
        renderExams();
    }
}

function filterStudents() {
    // Có thể mở rộng sau
}

// Init
function init() {
    if (students.length === 0) {
        students = [{id:1, name:"Maria Lopez", targetBand:"7.5"}];
        saveData();
    }
    navigateTo('dashboard');
}

window.onload = init;
</script>
</body>
</html>
